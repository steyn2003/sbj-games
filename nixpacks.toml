[phases.setup]
nixPkgs = [
  "nodejs_22",
  "npm-10_x",
  "php85",
  "php85Packages.composer",
  "php85Extensions.zip",
  "php85Extensions.gd",
  "php85Extensions.xml",
  "php85Extensions.dom",
  "php85Extensions.fileinfo",
  "php85Extensions.mbstring",
  "php85Extensions.sqlite3",
  "php85Extensions.pdo_sqlite",
  "php85Extensions.pgsql",
  "php85Extensions.pdo_pgsql",
  "nginx"
]

[phases.setup.variables]
NIXPACKS_PHP_NGINX_CONFIG_FILE = "nginx.template.conf"
NIXPACKS_PHP_ROOT_DIR = "/app/public"
NIXPACKS_PHP_INI_FILE = "php.ini"

[phases.build]
cmds = ["...", "cp php.ini /etc/php85/conf.d/99-custom.ini 2>/dev/null || true", "php artisan optimize", "php artisan storage:link"]
